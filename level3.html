<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 3 - Timeline Puzzle</title>
</head>
<body style="background:black;color:#00ffcc;font-family:monospace;text-align:center;padding-top:50px;">

<h1>LEVEL 3</h1>

<h2>TIMELINE RECOVERY</h2>

<p>
A corrupted timeline has been detected.
</p>

<p>
Enter the year hidden in the first transmission.
</p>

<input
type="number"
id="year"
placeholder="Enter Year">

<br><br>

<button onclick="checkYear()">
RESTORE TIMELINE
</button>

<script>

function checkYear(){

let year =
document.getElementById("year")
.value;

if(year=="2047"){

let xp =
Number(localStorage.getItem("xp")) || 0;

xp += 200;

localStorage.setItem("xp",xp);

localStorage.setItem(
"level3",
"completed"
);

alert(
"Timeline Restored!\n+200 XP"
);

window.location.href =
"level4.html";

}
else{

alert(
"Incorrect year.\nSearch the first clue again."
);

}

}

</script>

</body>
</html>
