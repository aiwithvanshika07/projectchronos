<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 4 - AI Interrogation</title>
</head>

<body style="background:black;color:#00ffcc;font-family:monospace;text-align:center;padding-top:40px;">

<h1>LEVEL 4</h1>

<h2>AI SCIENTIST INTERROGATION</h2>

<p>
Connection established...
</p>

<p>
AI Scientist: "Agent, answer carefully."
</p>

<hr style="width:60%;">

<p>
Question:
</p>

<h3>
What was the secret keyword decoded in Level 2?
</h3>

<input
type="text"
id="answer"
placeholder="Enter keyword">

<br><br>

<button onclick="checkAnswer()">
SUBMIT
</button>

<script>

function checkAnswer(){

let answer =
document.getElementById("answer")
.value
.trim()
.toUpperCase();

if(answer==="CHRONOS"){

let xp =
Number(localStorage.getItem("xp")) || 0;

xp += 300;

localStorage.setItem("xp",xp);

localStorage.setItem(
"level4",
"completed"
);

alert(
"Access Granted!\n+300 XP"
);

window.location.href =
"final.html";

}
else{

alert(
"Wrong answer.\nThe AI does not trust you."
);

}

}

</script>

</body>
</html>
